<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760" role="img" aria-labelledby="title desc">
    <title id="title">Two crawl tiers. One honest boundary.</title>
    <desc id="desc">Use DNS-pinned local crawling for untrusted public URLs. Use the small serverless tier only for origins you own or trust.</desc>
    <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07100e"/><stop offset="1" stop-color="#050806"/></linearGradient>
