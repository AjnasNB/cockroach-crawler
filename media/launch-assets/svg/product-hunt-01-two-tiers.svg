    <foreignObject x="46" y="292.25490566037735" width="533.4" height="53.99800000000001"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:22.040000000000003px;line-height:1.42;color:#a7b7b0;max-width:533.4px">Use DNS-pinned local crawling for untrusted public URLs. Use the small serverless tier only for origins you own or trust.</div></foreignObject>
