<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Network security boundary</title><desc id="desc">A public network path passes through DNS and redirect validation while private addresses, metadata endpoints, unsafe schemes, and credentials are blocked.</desc>
  <defs><linearGradient id="wall" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2d4a3f"/><stop offset="1" stop-color="#0d1915"/></linearGradient><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#284139" opacity=".32"/></pattern></defs>
  <rect width="720" height="560" fill="#07100e"/><rect width="720" height="560" fill="url(#grid)"/>
  <path d="M74 413 301 297l349 93-227 120z" fill="#091411" stroke="#355349"/><path d="M75 413v35l348 94v-32z" fill="#0c1a16" stroke="#355349"/>
  <g transform="translate(263 102)"><path d="m0 91 99-48 112 31-100 50z" fill="url(#wall)" stroke="#648a7d"/><path d="M0 91v238l111 31V124z" fill="#0b1713" stroke="#45675c"/><path d="M111 124v236l100-50V74z" fill="#0d211a" stroke="#45675c"/><path d="m63 184 48-23 48 13-48 24z" fill="#79f2a6"/><path d="M63 184v55l48 14v-55z" fill="#204d37"/><path d="M111 198v55l48-24v-55z" fill="#183c2c"/><path d="M24 124h45M24 151h66M24 178h35" stroke="#709188" stroke-width="4"/><text x="21" y="300" fill="#c2d2cc" font-family="monospace" font-size="13" transform="skewY(16)">DNS + REDIRECT</text></g>
  <g fill="#101917" stroke="#ff8b7b" font-family="monospace" font-size="11"><g transform="translate(62 242)"><rect width="130" height="48"/><text x="65" y="29" text-anchor="middle" fill="#ffc1ba">PRIVATE IP</text></g><g transform="translate(70 312)"><rect width="130" height="48"/><text x="65" y="29" text-anchor="middle" fill="#ffc1ba">METADATA</text></g><g transform="translate(489 217)"><rect width="142" height="48"/><text x="71" y="29" text-anchor="middle" fill="#ffc1ba">URL CREDENTIALS</text></g><g transform="translate(505 286)"><rect width="126" height="48"/><text x="63" y="29" text-anchor="middle" fill="#ffc1ba">UNSAFE SCHEME</text></g></g>
  <g stroke="#ff8b7b" stroke-width="3"><path d="m111 252 32 28m0-28-32 28M111 322l32 28m0-28-32 28M536 227l32 28m0-28-32 28M552 296l32 28m0-28-32 28"/></g>
  <path d="M172 404 288 349M472 399l103-48" stroke="#79f2a6" stroke-width="4" stroke-dasharray="8 6"/><circle cx="172" cy="404" r="7" fill="#79f2a6"/><circle cx="575" cy="351" r="7" fill="#79f2a6"/>
  <g transform="translate(533 375)"><path d="m0 30 52-26 51 14-52 27z" fill="#163027" stroke="#79f2a6"/><path d="M0 30v58l51 15V45z" fill="#0b1814" stroke="#45675c"/><path d="M51 45v58l52-26V18z" fill="#0d211a" stroke="#45675c"/><text x="19" y="68" fill="#b1f8c9" font-family="monospace" font-size="11">FETCH</text></g>
  <text x="34" y="44" fill="#79f2a6" font-family="monospace" font-size="12" letter-spacing="2">NETWORK ADMISSION / FAIL CLOSED</text><text x="34" y="69" fill="#8da19a" font-family="monospace" font-size="11">complete DNS answer set · every redirect hop</text>
</svg>
