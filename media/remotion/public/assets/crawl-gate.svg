<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img" aria-labelledby="title desc">
  <title id="title">Bounded crawl gate</title>
  <desc id="desc">An isometric machine routes a public URL through network, robots, origin, and budget checks before producing structured page records.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#162720"/><stop offset="1" stop-color="#09120f"/></linearGradient>
