<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cockroach Crawler</title><desc id="desc">Bounded public-web crawling for Node.js, illustrated as a mechanical policy gate.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0c1d17"/><stop offset=".55" stop-color="#07100e"/><stop offset="1" stop-color="#0c1718"/></linearGradient><pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0V50" fill="none" stroke="#294139" opacity=".28"/></pattern><linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#416455"/><stop offset="1" stop-color="#0c1b16"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#bg)"/><rect width="1200" height="630" fill="url(#grid)"/>
  <g transform="translate(70 72) scale(.75)"><rect width="64" height="64" rx="6" fill="#13231d" stroke="#45675c"/><g fill="none" stroke="#79f2a6" stroke-width="3" stroke-linecap="round"><path d="M27 18 18 9M37 18l9-9"/><path d="m24 27-10-5m9 12H11m14 8-9 8m24-23 10-5M41 34h12m-14 8 9 8"/></g><path d="M32 15c-5 0-8 4-8 9v2h16v-2c0-5-3-9-8-9Z" fill="#eff3ed"/><path d="M22 27h20v9c0 3-2 6-5 7H27c-3-1-5-4-5-7Z" fill="#eff3ed"/><path d="M26 43h12l-1 8c-.4 3-2.5 5-5 5s-4.6-2-5-5Z" fill="#eff3ed"/><path d="M25 32h14" stroke="#13231d" stroke-width="3"/><path d="M28 45h8" stroke="#79f2a6" stroke-width="3" stroke-linecap="round"/></g>
  <text x="135" y="105" fill="#eaf0ec" font-family="monospace" font-size="18" font-weight="700" letter-spacing="2">COCKROACH CRAWLER</text>
  <text x="70" y="232" fill="#f0f3ed" font-family="system-ui,sans-serif" font-size="54" font-weight="720" letter-spacing="-2.5">Crawl the public web.</text>
  <text x="70" y="294" fill="#f0f3ed" font-family="system-ui,sans-serif" font-size="54" font-weight="720" letter-spacing="-2.5">Keep the boundary explicit.</text>
  <text x="72" y="352" fill="#a8b8b2" font-family="system-ui,sans-serif" font-size="20">Node CLI + API &#183; robots &#183; DNS pinning</text>
  <text x="72" y="382" fill="#a8b8b2" font-family="system-ui,sans-serif" font-size="20">exact budgets &#183; Markdown + JSONL</text>
