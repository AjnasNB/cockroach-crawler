name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run test:types
      - run: npm run bench
      - run: npm run audit:licenses
      - name: Dry-run Cloudflare Worker bundle
        if: ${{ matrix.node == 24 }}
        run: npm run worker:check
      - run: npm audit --omit=dev --audit-level=high
      - run: npm pack --dry-run --json --ignore-scripts

  browser:
    name: Chromium integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: ./node_modules/.bin/playwright install --with-deps chromium
      - run: npm run test:browser
      - name: Build and verify website
        run: |
          npm --prefix website run build
          npm --prefix website run check
          npm --prefix website run check:browser

  benchmark-evidence:
    name: Exact-commit benchmark evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Generate exact-commit raw result
        env:
          BENCH_OUTPUT: bench/results/ci-local-regression.json
        run: npm run bench
      - name: Verify clean-source provenance
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const result = JSON.parse(fs.readFileSync("bench/results/ci-local-regression.json", "utf8"));
          if (result.source.commit !== process.env.GITHUB_SHA) throw new Error("Benchmark commit mismatch.");
          if (result.source.dirty !== false) throw new Error("Benchmark source must be clean.");
          if (result.correctness.status !== "passed") throw new Error("Benchmark correctness failed.");
          NODE
      - name: Upload raw benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-evidence-${{ github.sha }}
          path: bench/results/ci-local-regression.json
          if-no-files-found: error
          retention-days: 90

  package:
    name: Packed consumer (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install release npm CLI
        run: |
          npm install --global npm@12.0.1 --ignore-scripts --no-audit --no-fund
          test "$(npm --version)" = "12.0.1"
      - run: npm ci --ignore-scripts
      - run: npm run test:types
      - name: Install and execute the packed artifact
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/pack"
          consumer_dir="${RUNNER_TEMP}/consumer"
          mkdir -p "${pack_dir}" "${consumer_dir}"
          npm pack --ignore-scripts --pack-destination "${pack_dir}" --json > "${RUNNER_TEMP}/pack.json"
          filename="$(node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const entry=Array.isArray(value)?value[0]:value["cockroach-crawler"]??Object.values(value)[0]; if (!entry?.filename) process.exit(1); process.stdout.write(entry.filename)' "${RUNNER_TEMP}/pack.json")"
          tarball="${pack_dir}/${filename}"
          test -f "${tarball}"
          cd "${consumer_dir}"
          npm init --yes >/dev/null
          npm install "${tarball}" --ignore-scripts --no-audit --no-fund
          node --input-type=module -e "await import('cockroach-crawler'); await import('cockroach-crawler/agent'); await import('cockroach-crawler/sources'); await import('cockroach-crawler/serverless')"
          installed_version="$(node -e 'const fs=require("node:fs"); const manifest=JSON.parse(fs.readFileSync("node_modules/cockroach-crawler/package.json", "utf8")); process.stdout.write(manifest.version)')"
          test "$(./node_modules/.bin/cockroach-crawl --version)" = "${installed_version}"
          ./node_modules/.bin/cockroach-sources doctor --json > "${RUNNER_TEMP}/doctor.json"
          node -e 'const fs=require("node:fs"); const report=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (!Array.isArray(report) || !report.some((item) => item.id === "web")) process.exit(1)' "${RUNNER_TEMP}/doctor.json"
          size="$(wc -c < "${tarball}" | tr -d '[:space:]')"
          sha256="$(sha256sum "${tarball}" | awk '{print $1}')"
          integrity="sha512-$(openssl dgst -sha512 -binary "${tarball}" | openssl base64 -A)"
          printf '## Exact package artifact\n\n- Package: `cockroach-crawler@%s`\n- Commit: `%s`\n- Size: `%s` bytes\n- SHA-256: `%s`\n- Integrity: `%s`\n- npm CLI: `12.0.1`\n' "${installed_version}" "${GITHUB_SHA}" "${size}" "${sha256}" "${integrity}" >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload exact package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-artifact-${{ github.sha }}
          path: ${{ runner.temp }}/pack/*.tgz
          if-no-files-found: error
          retention-days: 90
